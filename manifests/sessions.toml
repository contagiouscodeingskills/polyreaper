# Session manifest — train / validation / holdout splits for OOS validation.
#
# Discipline: this file is the authoritative split. Holdout sessions MUST NOT
# be used for parameter discovery, signal hunting, or any analysis that would
# bias parameter choice. Train and validation sessions are fair game during
# parameter discovery; holdout is touched only AFTER parameters are frozen.
#
# Inventory built from VPS metadata only (no strategy analysis was run).
# VPS: 159.69.0.78, data dir /home/polybot/polybot/data
# Inventory date: 2026-05-03

schema_version = 1
created_at = "2026-05-03"
created_for = "Phase 3 OOS signal validation — Binance → Polymarket lag signal"

[host]
vps_host = "159.69.0.78"
vps_data_dir = "/home/polybot/polybot/data"

# ----------------------------------------------------------------------------
# Splits
# ----------------------------------------------------------------------------

[splits]
# Sessions previously used for signal discovery / parameter exploration.
# These are quarantined from holdout forever.
train = [
  "session_20260426T122347Z",
  "session_20260427T100216Z",
]

# Empty. The only candidate (session_20260502T071957Z) cannot be proven
# untouched by lag/signal/OOS work to a sufficient standard — see its
# per-session entry below. Conservative default per project policy:
# leave validation empty rather than risk a contaminated tier.
validation = []

# Empty. Holdout is reserved for the freshest clean finalised-recorder
# session. The current candidate is session_20260503T000248Z. It is NOT
# yet promoted; promote only after ALL of these hold:
#   - >= 48h of continuous capture without recorder restart
#   - replayer integrity check returns PASS (T0/T1/T2 verdict)
#   - last health snapshot reports write_failures = 0 across all feeds
#   - no ENOSPC events recorded during the window
#   - last health snapshot reports stalled = false across all feeds
#   - chrony.available = true throughout the window
holdout = []
holdout_status = "pending"
holdout_target_duration_hours = 48
holdout_candidate = "session_20260503T000248Z"

# ----------------------------------------------------------------------------
# Per-session metadata (snapshot from VPS at 2026-05-03)
# ----------------------------------------------------------------------------
#
# Field key:
#   recorder_phase         — recorder build era inferred from sidecars present
#   session_meta_present   — true iff _session_meta.json exists (from b7dfab6+)
#   phase4_health_enrichment — true iff health snapshots include disk_free_bytes
#   phase5_polymarket_batch  — true iff Polymarket events carry wire_batch_id
#   integrity_status       — "pass" | "fail" | "warn" | "not_assessed"
#   quality                — "usable" | "usable_pending_duration" | "damaged"
#                            | "archival" | "fragment"

