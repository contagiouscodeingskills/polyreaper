# Sample recorder-phase config for local development.
# Copy this file, edit paths/URLs, and pass the path to `recorder`.

[app]
environment = "dev"
shutdown_grace_secs = 10

[telemetry]
# tracing EnvFilter syntax: "info", "recorder=debug,info", etc.
log_level = "info"
log_format = "pretty"   # "pretty" | "json"

[storage]
base_dir = "./data"
rotate_minutes = 60     # 0 disables rotation
fsync_on_write = false

[binance_feed]
ws_url = "wss://stream.binance.com:443/ws"
# Binance wire names. `@bookTicker` ticks on every BBO change (sub-ms
# cadence) — without it the finest top-of-book resolution is the 100 ms
# depth diff, which is too coarse for sub-100 ms lead/lag analysis.
streams = ["btcusdt@trade", "btcusdt@depth@100ms", "btcusdt@bookTicker"]
read_idle_secs = 30

[binance_feed.reconnect]
initial_ms = 500
max_ms = 30000
multiplier = 2.0

[polymarket_feed]
# TODO confirm endpoint against live behaviour. Best guess: the CLOB
# "market" channel for book / BBO style updates.
ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/market"
# CLOB REST base — used for the per-token `/book` snapshot fetched on
# each WS connect AND on every incremental subscription refresh. Gives
# replay an absolute baseline before the first WS book event arrives.
clob_url = "https://clob.polymarket.com"
# 22h soak observed ~46 reconnects/hour at 30s — Polymarket goes quiet
# during low-trade lulls. 120s lets ping/pong keep us alive while still
# detecting dead connections within 2 min.
read_idle_secs = 120
# How often (seconds) to refresh the WS subscription against the
# market registry. New 5-min BTC markets are discovered by gamma every
# 15s; without this refresh they'd only be picked up on the next full
# reconnect (5-15 min), missing the first portion of each market.
subscription_refresh_secs = 10

[polymarket_feed.reconnect]
initial_ms = 500
max_ms = 30000
multiplier = 2.0

[market_discovery]
# Polymarket Gamma `/events` endpoint. Discovery filters to events whose
# `series.slug` equals `series_slug` below. The series is the recurring
# template — events under it are the individual 5-minute windows. Each
# resolves via Chainlink BTC/USD, not Binance Spot.
gamma_url = "https://gamma-api.polymarket.com/events"
poll_interval_secs = 15
series_slug = "btc-up-or-down-5m"

[coinbase_feed]
# Coinbase Advanced Trade WebSocket. Public, no auth needed for
# `market_trades`.
ws_url = "wss://advanced-trade-ws.coinbase.com"
product_ids = ["BTC-USD"]
channel = "market_trades"
read_idle_secs = 30
[coinbase_feed.reconnect]
initial_ms = 500
max_ms = 30000
multiplier = 2.0

[chainlink_feed]
# Ethereum mainnet WebSocket RPC. publicnode is free, rate-limited.
# Swap to Alchemy/Infura for higher reliability.
ws_url = "wss://ethereum-rpc.publicnode.com"
# Chainlink BTC/USD AggregatorV3 on Ethereum Mainnet.
contract_address = "0xF4030086522a5bEEa4988F8cA5B36dbC97BeE88c"
# On-chain BTC/USD updates ~hourly (heartbeat) or on >0.5% deviation.
# 60s idle was forcing a reconnect every minute, missing every event.
# 600s lets the connection stay alive between events; TCP keepalive
# detects truly dead sockets within ~2 min anyway.
read_idle_secs = 600
[chainlink_feed.reconnect]
initial_ms = 1000
max_ms = 60000
multiplier = 2.0
